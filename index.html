<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nnvanungi</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      min-height: 100vh;
      padding-bottom: 70px;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
      position: sticky;
      top: 0;
      background: var(--tg-theme-bg-color, #fff);
      z-index: 10;
    }
    #topbar h1 { font-size: 17px; font-weight: 600; }
    #token-badge {
      font-size: 13px;
      background: var(--tg-theme-button-color, #007aff);
      color: var(--tg-theme-button-text-color, #fff);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Nav tabs ── */
    #nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      background: var(--tg-theme-bg-color, #fff);
      border-top: 1px solid var(--tg-theme-hint-color, #ccc);
      z-index: 10;
    }
    #nav button {
      flex: 1;
      padding: 10px 4px 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: var(--tg-theme-hint-color, #888);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    #nav button span.icon { font-size: 22px; line-height: 1; }
    #nav button.active { color: var(--tg-theme-button-color, #007aff); }

    /* ── Screens ── */
    .screen { display: none; padding: 16px; }
    .screen.active { display: block; }

    /* ── Generic UI pieces ── */
    textarea, input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 10px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
      font-size: 15px;
      resize: none;
      outline: none;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: var(--tg-theme-button-color, #007aff);
    }

    button.primary {
      width: 100%;
      padding: 12px;
      background: var(--tg-theme-button-color, #007aff);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    button.primary:disabled { opacity: 0.5; cursor: default; }

    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .mode-toggle button {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      background: none;
      color: var(--tg-theme-text-color, #000);
      font-size: 13px;
      cursor: pointer;
    }
    .mode-toggle button.active {
      background: var(--tg-theme-button-color, #007aff);
      color: var(--tg-theme-button-text-color, #fff);
      border-color: transparent;
    }

    .toast {
      position: fixed;
      top: 60px; left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── Search screen ── */
    .search-type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .search-type-toggle button {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      background: none;
      color: var(--tg-theme-text-color, #000);
      font-size: 13px;
      cursor: pointer;
    }
    .search-type-toggle button.active {
      background: var(--tg-theme-button-color, #007aff);
      color: var(--tg-theme-button-text-color, #fff);
      border-color: transparent;
    }

    .result-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .result-item {
      padding: 10px 12px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 10px;
    }
    .result-item .name { font-size: 15px; font-weight: 500; }
    .result-item .sub  { font-size: 12px; color: var(--tg-theme-hint-color, #888); margin-top: 2px; }

    /* ── Todos screen ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--tg-theme-hint-color, #888);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px;
    }
    .section-title:first-child { margin-top: 0; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .todo-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--tg-theme-hint-color, #ccc);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    .todo-check.done {
      background: #34c759;
      border-color: #34c759;
      color: #fff;
    }
    .todo-body { flex: 1; min-width: 0; }
    .todo-title { font-size: 15px; word-break: break-word; }
    .todo-title.done { text-decoration: line-through; opacity: 0.5; }
    .todo-meta { font-size: 12px; color: var(--tg-theme-hint-color, #888); margin-top: 3px; }

    .priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 7px;
    }
    .priority-dot.urgent { background: #ff3b30; }
    .priority-dot.high   { background: #ff9500; }
    .priority-dot.medium { background: #ffcc00; }
    .priority-dot.low    { background: #34c759; }

    /* ── Memory screen ── */
    .memory-field {
      padding: 12px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .memory-field .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 4px;
    }
    .memory-field .value { font-size: 15px; }
    .memory-field .value.empty { color: var(--tg-theme-hint-color, #888); font-style: italic; }

    .sub-balance {
      padding: 12px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 10px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sub-balance .label { font-size: 13px; color: var(--tg-theme-hint-color, #888); }
    .sub-balance .value { font-size: 20px; font-weight: 700; }

    /* ── Loading / empty states ── */
    .state-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--tg-theme-hint-color, #888);
      font-size: 15px;
    }

    /* ── Auth screen ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      text-align: center;
      gap: 12px;
    }
    #auth-screen h2 { font-size: 22px; }
    #auth-screen p  { color: var(--tg-theme-hint-color, #888); font-size: 15px; }
  </style>
</head>
<body>

<!-- Auth / loading state -->
<div id="auth-screen">
  <span style="font-size:48px">🧠</span>
  <h2>Nnvanungi</h2>
  <p id="auth-msg">Starting up…</p>
</div>

<!-- Main app (hidden until authed) -->
<div id="app" style="display:none">

  <div id="topbar">
    <h1>Nnvanungi</h1>
    <div id="token-badge">— tokens</div>
  </div>

  <!-- HOME: send entry or agent message -->
  <div id="screen-home" class="screen active">
    <div class="mode-toggle">
      <button class="active" onclick="setMode('journal')">📝 Journal</button>
      <button onclick="setMode('agent')">🤖 Agent</button>
    </div>
    <textarea id="entry-text" rows="5" placeholder="Write a memory or tell me what to do…"></textarea>
    <button class="primary" id="send-btn" onclick="sendEntry()">Send</button>
    <div id="send-result" style="margin-top:12px; font-size:14px; color: var(--tg-theme-hint-color,#888);"></div>
  </div>

  <!-- SEARCH -->
  <div id="screen-search" class="screen">
    <div class="search-type-toggle">
      <button class="active" onclick="setSearchType('contacts')">👤 Contacts</button>
      <button onclick="setSearchType('nodes')">🔗 Nodes</button>
    </div>
    <input type="text" id="search-input" placeholder="Search…" oninput="onSearchInput()" />
    <div id="search-results" class="result-list">
      <div class="state-msg">Start typing to search.</div>
    </div>
  </div>

  <!-- TODOS -->
  <div id="screen-todos" class="screen">
    <div id="todos-list"><div class="state-msg">Loading…</div></div>
  </div>

  <!-- MEMORY -->
  <div id="screen-memory" class="screen">
    <div id="memory-content"><div class="state-msg">Loading…</div></div>
  </div>

  <!-- Bottom nav -->
  <nav id="nav">
    <button class="active" onclick="switchTab('home')">
      <span class="icon">✏️</span>Home
    </button>
    <button onclick="switchTab('search')">
      <span class="icon">🔍</span>Search
    </button>
    <button onclick="switchTab('todos')">
      <span class="icon">✅</span>Todos
    </button>
    <button onclick="switchTab('memory')">
      <span class="icon">🧠</span>Memory
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const SUPABASE_URL = 'https://zixysyctnynphstyvvgx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppeHlzeWN0bnlucGhzdHl2dmd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDk0NzMsImV4cCI6MjA5MDUyNTQ3M30.yd47GXbapX4BgDKmh8YkBqLhFvEBa6OIqvpFv1qmFUk';
const FN = (name) => `${SUPABASE_URL}/functions/v1/${name}`;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let accessToken = null;
let userId      = null;
let sendMode    = 'journal';
let searchType  = 'contacts';
let searchTimer = null;

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.Telegram.WebApp.ready();
window.Telegram.WebApp.expand();

async function init() {
  const tg = window.Telegram.WebApp;
  const initData = tg.initData;

  if (!initData) {
    // Dev fallback: no initData means we're in a browser, not Telegram
    document.getElementById('auth-msg').textContent =
      'Open this inside Telegram to use the app.';
    return;
  }

  document.getElementById('auth-msg').textContent = 'Signing you in…';

  try {
    const res = await fetch(FN('miniapp-auth'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData }),
    });
    const data = await res.json();

    if (!res.ok || !data.access_token) {
      document.getElementById('auth-msg').textContent =
        data.error || 'Sign-in failed. Please restart.';
      return;
    }

    accessToken = data.access_token;
    userId      = data.user_id;

    // Show app
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    loadTokenBalance();
    loadTodos();
    loadMemory();

  } catch (err) {
    document.getElementById('auth-msg').textContent = 'Network error. Try again.';
    console.error(err);
  }
}

// ═══════════════════════════════════════════════════
// TOKEN BALANCE
// ═══════════════════════════════════════════════════
async function loadTokenBalance() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/subscriptions?user_id=eq.${userId}&status=eq.active&select=tokens_remaining,tier&limit=1`,
      { headers: authHeaders() }
    );
    const data = await res.json();
    const sub = data?.[0];
    if (sub) {
      document.getElementById('token-badge').textContent =
        `${sub.tokens_remaining} tokens`;
    } else {
      document.getElementById('token-badge').textContent = 'No plan';
    }
  } catch (e) { console.error(e); }
}

// ═══════════════════════════════════════════════════
// HOME — SEND ENTRY
// ═══════════════════════════════════════════════════
function setMode(mode) {
  sendMode = mode;
  document.querySelectorAll('.mode-toggle button').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && mode === 'journal') || (i === 1 && mode === 'agent'));
  });
  document.getElementById('entry-text').placeholder =
    mode === 'journal'
      ? 'Write a memory, note, or thought…'
      : 'Tell me what to do — I\'ll handle it and reply on Telegram.';
}

async function sendEntry() {
  const text = document.getElementById('entry-text').value.trim();
  if (!text) return;

  const btn = document.getElementById('send-btn');
  const result = document.getElementById('send-result');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  result.textContent = '';

  try {
    const res = await fetch(FN('miniapp-send'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${accessToken}` },
      body: JSON.stringify({ text, mode: sendMode }),
    });
    const data = await res.json();

    if (res.ok && data.ok) {
      document.getElementById('entry-text').value = '';
      result.textContent = data.reply;
      showToast(data.reply);
      if (sendMode === 'journal') loadTodos(); // refresh in case agent created a todo
      loadTokenBalance();
    } else {
      result.textContent = data.error || 'Something went wrong.';
    }
  } catch (err) {
    result.textContent = 'Network error.';
  }

  btn.disabled = false;
  btn.textContent = 'Send';
}

// ═══════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════
function setSearchType(type) {
  searchType = type;
  document.querySelectorAll('.search-type-toggle button').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && type === 'contacts') || (i === 1 && type === 'nodes'));
  });
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '<div class="state-msg">Start typing to search.</div>';
}

function onSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('search-input').value.trim();
  if (!q) {
    document.getElementById('search-results').innerHTML = '<div class="state-msg">Start typing to search.</div>';
    return;
  }
  document.getElementById('search-results').innerHTML = '<div class="state-msg">Searching…</div>';
  searchTimer = setTimeout(() => runSearch(q), 300);
}

async function runSearch(query) {
  try {
    const res = await fetch(FN('miniapp-search'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${accessToken}` },
      body: JSON.stringify({ type: searchType, query, limit: 10 }),
    });
    const data = await res.json();
    renderSearchResults(data);
  } catch (err) {
    document.getElementById('search-results').innerHTML = '<div class="state-msg">Search failed.</div>';
  }
}

function renderSearchResults(results) {
  const el = document.getElementById('search-results');
  if (!results || results.length === 0) {
    el.innerHTML = '<div class="state-msg">No results found.</div>';
    return;
  }
  el.innerHTML = results.map(r => `
    <div class="result-item">
      <div class="name">${esc(r.name)}</div>
      ${r.sub ? `<div class="sub">${esc(r.sub)}</div>` : ''}
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════
// TODOS
// ═══════════════════════════════════════════════════
async function loadTodos() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/todos?user_id=eq.${userId}&order=due_date.asc.nullslast,created_at.desc&select=id,title,status,priority,due_date,description`,
      { headers: authHeaders() }
    );
    const todos = await res.json();
    renderTodos(todos || []);
  } catch (e) {
    document.getElementById('todos-list').innerHTML = '<div class="state-msg">Failed to load todos.</div>';
  }
}

function renderTodos(todos) {
  const el = document.getElementById('todos-list');

  const open       = todos.filter(t => t.status === 'open');
  const inProgress = todos.filter(t => t.status === 'in_progress');
  const done       = todos.filter(t => t.status === 'done').slice(0, 5); // cap recent done

  if (todos.length === 0) {
    el.innerHTML = '<div class="state-msg">No todos yet 🎉</div>';
    return;
  }

  let html = '';

  if (inProgress.length > 0) {
    html += `<div class="section-title">In progress</div>`;
    html += inProgress.map(t => todoHTML(t)).join('');
  }
  if (open.length > 0) {
    html += `<div class="section-title">Open</div>`;
    html += open.map(t => todoHTML(t)).join('');
  }
  if (done.length > 0) {
    html += `<div class="section-title">Recently done</div>`;
    html += done.map(t => todoHTML(t)).join('');
  }

  el.innerHTML = html;
}

function todoHTML(t) {
  const isDone   = t.status === 'done';
  const priority = t.priority || 'medium';
  const due      = t.due_date
    ? new Date(t.due_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
    : null;
  const isOverdue = t.due_date && !isDone && new Date(t.due_date) < new Date();

  return `
    <div class="todo-item" id="todo-${t.id}">
      <button class="todo-check ${isDone ? 'done' : ''}"
              onclick="toggleTodo('${t.id}', '${t.status}')"
              title="${isDone ? 'Mark open' : 'Mark done'}">
        ${isDone ? '✓' : ''}
      </button>
      <div class="priority-dot ${priority}"></div>
      <div class="todo-body">
        <div class="todo-title ${isDone ? 'done' : ''}">${esc(t.title)}</div>
        <div class="todo-meta">
          ${priority}${due ? ` · <span style="${isOverdue ? 'color:#ff3b30' : ''}">${isOverdue ? '⚠ ' : ''}${due}</span>` : ''}
        </div>
      </div>
    </div>
  `;
}

async function toggleTodo(id, currentStatus) {
  const newStatus = currentStatus === 'done' ? 'open' : 'done';
  const completed_at = newStatus === 'done' ? new Date().toISOString() : null;

  // Optimistic UI
  const item = document.getElementById(`todo-${id}`);
  if (item) item.style.opacity = '0.5';

  try {
    const body = { status: newStatus, modified_at: new Date().toISOString() };
    if (completed_at !== null) body.completed_at = completed_at;

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`,
      {
        method: 'PATCH',
        headers: { ...authHeaders(), 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify(body),
      }
    );
    if (res.ok) {
      showToast(newStatus === 'done' ? 'Marked done ✓' : 'Reopened');
      loadTodos();
    } else {
      if (item) item.style.opacity = '1';
      showToast('Update failed');
    }
  } catch {
    if (item) item.style.opacity = '1';
    showToast('Network error');
  }
}

// ═══════════════════════════════════════════════════
// MEMORY
// ═══════════════════════════════════════════════════
async function loadMemory() {
  try {
    const [profileRes, subRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=full_name,occupation,location,bio,timezone&limit=1`, { headers: authHeaders() }),
      fetch(`${SUPABASE_URL}/rest/v1/subscriptions?user_id=eq.${userId}&status=eq.active&select=tier,tokens_remaining,tokens_used&limit=1`, { headers: authHeaders() }),
    ]);
    const profiles = await profileRes.json();
    const subs     = await subRes.json();
    renderMemory(profiles?.[0], subs?.[0]);
  } catch (e) {
    document.getElementById('memory-content').innerHTML = '<div class="state-msg">Failed to load.</div>';
  }
}

function renderMemory(profile, sub) {
  const el = document.getElementById('memory-content');
  let html = '';

  if (sub) {
    html += `
      <div class="sub-balance">
        <div>
          <div class="label">${sub.tier === 'pro' ? 'Pro plan' : 'Basic plan'}</div>
          <div style="font-size:12px; color: var(--tg-theme-hint-color,#888); margin-top:2px">${sub.tokens_used} used</div>
        </div>
        <div class="value">${sub.tokens_remaining} <span style="font-size:14px; font-weight:400">tokens</span></div>
      </div>
    `;
  } else {
    html += `<div class="memory-field"><div class="label">Plan</div><div class="value empty">No active plan</div></div>`;
  }

  const fields = [
    { label: 'Name',       value: profile?.full_name },
    { label: 'Occupation', value: profile?.occupation },
    { label: 'Location',   value: profile?.location },
    { label: 'Bio',        value: profile?.bio },
    { label: 'Timezone',   value: profile?.timezone },
  ];

  fields.forEach(f => {
    html += `
      <div class="memory-field">
        <div class="label">${f.label}</div>
        <div class="value ${f.value ? '' : 'empty'}">${f.value ? esc(f.value) : 'not set'}</div>
      </div>
    `;
  });

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  const idx = { home: 0, search: 1, todos: 2, memory: 3 }[tab];
  document.querySelectorAll('#nav button')[idx].classList.add('active');

  // Refresh on visit
  if (tab === 'todos')  loadTodos();
  if (tab === 'memory') loadMemory();
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function authHeaders() {
  return {
    Authorization: `Bearer ${accessToken}`,
    apikey: SUPABASE_ANON_KEY,
  };
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Start ──
init();
